<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Referee Lookup Widget</title>
<script src="https://js.jotform.com/JotFormCustomWidget.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: transparent;
    padding: 4px 0;
  }

  #search-container {
    position: relative;
    width: 100%;
  }

  #search-input {
    width: 100%;
    padding: 8px 12px;
    font-size: 14px;
    border: 1px solid #b8c2cc;
    border-radius: 4px;
    outline: none;
    background: #fff;
    color: #333;
    transition: border-color 0.2s;
  }

  #search-input:focus {
    border-color: #0075e2;
    box-shadow: 0 0 0 2px rgba(0,117,226,0.15);
  }

  #search-input::placeholder { color: #aaa; }

  #dropdown {
    display: none;
    position: absolute;
    top: calc(100% + 4px);
    left: 0;
    right: 0;
    background: #fff;
    border: 1px solid #b8c2cc;
    border-radius: 4px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.12);
    z-index: 99999;
    max-height: 220px;
    overflow-y: auto;
  }

  .dropdown-item {
    padding: 9px 12px;
    cursor: pointer;
    font-size: 13px;
    color: #222;
    border-bottom: 1px solid #f0f0f0;
    transition: background 0.15s;
  }

  .dropdown-item:last-child { border-bottom: none; }

  .dropdown-item:hover, .dropdown-item.active {
    background: #e8f0fe;
    color: #0075e2;
  }

  .dropdown-item .referee-name { font-weight: 600; font-size: 13px; }
  .dropdown-item .referee-details { font-size: 11px; color: #777; margin-top: 2px; }

  #status {
    font-size: 11px;
    margin-top: 5px;
    color: #888;
    min-height: 16px;
  }

  #status.success { color: #2e7d32; font-weight: 600; }
  #status.error   { color: #c62828; }

  .no-results {
    padding: 10px 12px;
    font-size: 13px;
    color: #999;
    font-style: italic;
  }

  #selected-info {
    display: none;
    margin-top: 8px;
    padding: 8px 12px;
    background: #e8f4e8;
    border: 1px solid #a5d6a7;
    border-radius: 4px;
    font-size: 12px;
    color: #2e7d32;
  }
</style>
</head>
<body>

<div id="search-container">
  <input
    type="text"
    id="search-input"
    placeholder="Type referee last name to search..."
    autocomplete="off"
  />
  <div id="dropdown"></div>
</div>
<div id="selected-info"></div>
<div id="status">Loading referee data...</div>

<script>
  // ── CONFIG ───────────────────────────────────────────────────────────────────
  const SHEET_ID  = '1L0TpUPxEfpcU-vF4puekZXZiKjd4yYEE-aPBfhehZpA';
  const GID       = '1452173467';
  const CSV_URL   = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${GID}`;

  // JotForm field IDs — numbers only (no #, no input_)
  const FIELD_NAME  = '775';
  const FIELD_EMAIL = '719';
  const FIELD_PHONE = '781';
  // ─────────────────────────────────────────────────────────────────────────────

  let referees = [];
  let widgetReady = false;

  // ── JOTFORM WIDGET API ───────────────────────────────────────────────────────
  JFCustomWidget.subscribe('ready', function() {
    widgetReady = true;
    loadReferees();
  });

  // Fallback if Widget API doesn't fire
  setTimeout(function() {
    if (!widgetReady) loadReferees();
  }, 1500);

  function fillJotFormFields(referee) {
    // Method 1: JotForm Widget API - set other fields
    if (typeof JFCustomWidget !== 'undefined') {
      // Set this widget's own value
      JFCustomWidget.setValue(referee.name);

      // Send data to other fields using JotForm's postMessage protocol
      sendToField(FIELD_NAME,  referee.name);
      sendToField(FIELD_EMAIL, referee.email);
      sendToField(FIELD_PHONE, referee.phone);
    }

    // Method 2: Direct postMessage with JotForm's known formats
    var formats = [
      // Format A
      { type: 'updateQuestion', questionID: FIELD_NAME,  value: referee.name  },
      { type: 'updateQuestion', questionID: FIELD_EMAIL, value: referee.email },
      { type: 'updateQuestion', questionID: FIELD_PHONE, value: referee.phone },
      // Format B
      { action: 'setFieldValue', fieldID: FIELD_NAME,  value: referee.name  },
      { action: 'setFieldValue', fieldID: FIELD_EMAIL, value: referee.email },
      { action: 'setFieldValue', fieldID: FIELD_PHONE, value: referee.phone },
    ];

    formats.forEach(function(msg) {
      window.parent.postMessage(JSON.stringify(msg), '*');
      window.parent.postMessage(msg, '*');
    });

    // Method 3: Try direct DOM
    try {
      var doc = window.parent.document;
      fillField(doc, 'input_' + FIELD_NAME,  referee.name);
      fillField(doc, 'input_' + FIELD_EMAIL, referee.email);
      fillField(doc, 'input_' + FIELD_PHONE, referee.phone);
    } catch(e) {}

    // Show confirmation inside widget
    var info = document.getElementById('selected-info');
    info.style.display = 'block';
    info.innerHTML = '✓ <strong>' + referee.name + '</strong><br>' +
                     referee.email + (referee.phone ? ' · ' + referee.phone : '');

    setStatus('✓ Referee selected', 'success');
  }

  function sendToField(fieldID, value) {
    var msg = JSON.stringify({
      type: 'widgetEvent',
      action: 'setValue',
      fieldID: fieldID,
      value: value
    });
    window.parent.postMessage(msg, '*');
  }

  function fillField(doc, id, value) {
    var el = doc.getElementById(id);
    if (!el) return;
    try {
      var setter = Object.getOwnPropertyDescriptor(
        window.parent.HTMLInputElement.prototype, 'value'
      ).set;
      setter.call(el, value);
    } catch(e) { el.value = value; }
    el.dispatchEvent(new Event('input',  { bubbles: true }));
    el.dispatchEvent(new Event('change', { bubbles: true }));
    el.dispatchEvent(new Event('blur',   { bubbles: true }));
  }

  // ── CSV PARSER ───────────────────────────────────────────────────────────────
  function parseCSV(text) {
    var lines = text.trim().split('\n');
    if (lines.length < 2) return [];
    var headers = lines[0].split(',').map(function(h) {
      return h.trim().replace(/^"|"$/g, '').toLowerCase();
    });
    var nameIdx  = headers.findIndex(function(h) { return h.includes('name');  });
    var emailIdx = headers.findIndex(function(h) { return h.includes('email'); });
    var phoneIdx = headers.findIndex(function(h) { return h.includes('phone'); });
    var results = [];
    for (var i = 1; i < lines.length; i++) {
      var cols = lines[i].match(/(".*?"|[^,]+)(?=\s*,|\s*$)/g) || lines[i].split(',');
      var clean = cols.map(function(c) { return c ? c.trim().replace(/^"|"$/g, '') : ''; });
      if (!clean[nameIdx]) continue;
      results.push({
        name:  clean[nameIdx]  || '',
        email: clean[emailIdx] || '',
        phone: clean[phoneIdx] || ''
      });
    }
    return results;
  }

  // ── LOAD SHEET ───────────────────────────────────────────────────────────────
  function loadReferees() {
    fetch(CSV_URL)
      .then(function(res) {
        if (!res.ok) throw new Error('HTTP ' + res.status);
        return res.text();
      })
      .then(function(text) {
        referees = parseCSV(text);
        setStatus(referees.length > 0
          ? '✓ ' + referees.length + ' referees loaded. Type a last name to search.'
          : 'No referee data found.', referees.length > 0 ? 'success' : 'error');
      })
      .catch(function() {
        setStatus('⚠ Could not load referee list.', 'error');
      });
  }

  function setStatus(msg, type) {
    var el = document.getElementById('status');
    el.textContent = msg;
    el.className = type || '';
  }

  // ── SEARCH ───────────────────────────────────────────────────────────────────
  function searchReferees(query) {
    if (!query || query.length < 2) return [];
    var q = query.toLowerCase().trim();
    return referees.filter(function(r) {
      var parts = r.name.toLowerCase().split(/\s+/);
      var lastName = parts[parts.length - 1];
      return lastName.startsWith(q) || r.name.toLowerCase().includes(q);
    });
  }

  // ── UI ───────────────────────────────────────────────────────────────────────
  var searchInput = document.getElementById('search-input');
  var dropdown    = document.getElementById('dropdown');

  function renderDropdown(results) {
    dropdown.innerHTML = '';
    if (results.length === 0) {
      dropdown.innerHTML = '<div class="no-results">No referees found</div>';
      dropdown.style.display = 'block';
      return;
    }
    results.forEach(function(r) {
      var item = document.createElement('div');
      item.className = 'dropdown-item';
      item.innerHTML =
        '<div class="referee-name">' + r.name + '</div>' +
        '<div class="referee-details">' + r.email + (r.phone ? ' · ' + r.phone : '') + '</div>';
      item.addEventListener('mousedown', function(e) {
        e.preventDefault();
        selectReferee(r);
      });
      dropdown.appendChild(item);
    });
    dropdown.style.display = 'block';
  }

  function selectReferee(r) {
    searchInput.value = r.name;
    dropdown.style.display = 'none';
    fillJotFormFields(r);
  }

  searchInput.addEventListener('input', function() {
    var q = searchInput.value.trim();
    if (q.length < 2) { dropdown.style.display = 'none'; return; }
    renderDropdown(searchReferees(q));
  });

  searchInput.addEventListener('blur',  function() {
    setTimeout(function() { dropdown.style.display = 'none'; }, 150);
  });

  searchInput.addEventListener('focus', function() {
    var q = searchInput.value.trim();
    if (q.length >= 2) renderDropdown(searchReferees(q));
  });

  searchInput.addEventListener('keydown', function(e) {
    var items  = dropdown.querySelectorAll('.dropdown-item');
    var active = dropdown.querySelector('.dropdown-item.active');
    var idx    = Array.from(items).indexOf(active);

    if (e.key === 'ArrowDown') {
      e.preventDefault();
      if (idx < items.length - 1) {
        active && active.classList.remove('active');
        items[idx + 1].classList.add('active');
        items[idx + 1].scrollIntoView({ block: 'nearest' });
      }
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      if (idx > 0) {
        active && active.classList.remove('active');
        items[idx - 1].classList.add('active');
        items[idx - 1].scrollIntoView({ block: 'nearest' });
      }
    } else if (e.key === 'Enter') {
      e.preventDefault();
      if (active) active.dispatchEvent(new MouseEvent('mousedown'));
    } else if (e.key === 'Escape') {
      dropdown.style.display = 'none';
    }
  });
</script>
</body>
</html>
